<!doctype html>
<html lang="en">
  <head>
    <!-- Character Set -->
    <meta charset="UTF-8" />
    
    <!-- Viewport Settings for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" href="/Asset1.svg" type="image/svg+xml" />

    <!-- Title of the Page -->
    <title>TaskTrek</title>

    <!-- Meta Description for SEO -->
    <meta name="description" content="TaskTrek is a platform designed to help people find reliable carpooling services and efficient transportation solutions for their daily commutes in Dubai." />

    <!-- Author of the website -->
    <meta name="author" content="TaskTrek" />

    <!-- Open Graph meta tags for Facebook & other social media -->
    <meta property="og:title" content="TaskTrek" />
    <meta property="og:description" content="TaskTrek is a platform for professionals to find reliable carpooling and transport services in Dubai, providing a sustainable and cost-effective way to commute." />
    <meta property="og:image" content="/path-to-your-image.jpg" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta property="og:type" content="website" />

    <!-- Additional Meta Tags -->
    <meta name="robots" content="index, follow" /> <!-- Tells search engines to index and follow links on this page -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" /> <!-- Ensures compatibility with older versions of Internet Explorer -->

    <!-- Social Media Sharing -->
    <meta property="og:site_name" content="TaskTrek" /> <!-- Optional, name of your site for social media -->

    <!-- Application Metadata -->
    <meta name="theme-color" content="#25D366" /> <!-- Theme color for mobile browsers (use a prominent color for your brand) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
